## ============================================================
## sharding-01.yml —— 多库多表（生产推荐模式）
## 场景：2个数据库（db_0、db_1），每库3张分表（tb_order_0/1/2）
## 分库键：order_id % 2 → db_0 或 db_1
## 分表键：order_id % 3 → tb_order_0 / tb_order_1 / tb_order_2
## 共 2×3=6 张物理表
## ============================================================
spring:
  shardingsphere:
    datasource:
      names: db_0,db_1
      db_0:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: jdbc:mysql://localhost:3306/shardingsphere_01?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
        username: root
        password: 123456
        hikari:
          maximum-pool-size: 20
          minimum-idle: 5
          connection-timeout: 30000
      db_1:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: jdbc:mysql://localhost:3306/shardingsphere_02?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
        username: root
        password: 123456
        hikari:
          maximum-pool-size: 20
          minimum-idle: 5
          connection-timeout: 30000

    rules:
      sharding:
        tables:
          tb_order:
            # 2库 × 3表 = 6张物理表
            actual-data-nodes: db_${0..1}.tb_order_${0..2}
            database-strategy:
              standard:
                sharding-column: order_id
                sharding-algorithm-name: db_mod_2   # order_id % 2 决定库
            table-strategy:
              standard:
                sharding-column: order_id
                sharding-algorithm-name: table_mod_3  # order_id % 3 决定表

        sharding-algorithms:
          db_mod_2:
            type: MOD          # 使用内置 MOD 算法，比 INLINE 更规范
            props:
              sharding-count: 2  # 分2个库

          table_mod_3:
            type: MOD
            props:
              sharding-count: 3  # 每库3张表

        # 分布式主键生成（重要！分表后不能用数据库自增ID，否则各分表ID会重复）
        key-generators:
          snowflake:
            type: SNOWFLAKE
            props:
              worker-id: 1  # 每个服务实例的 workerID（0~1023），多实例部署时必须不同！

    props:
      sql-show: true              # 打印 ShardingSphere 改写后的真实 SQL
      sql-comment-parse-enabled: true
      # max-connections-size-per-query: 50  # 每次查询最多连接数（默认1，跨分片查询时可调大）